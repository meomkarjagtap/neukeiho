name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf

      - name: Tidy and download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build linux/amd64 (x86_64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: gcc
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }} -s -w" \
            -o dist/neukeiho-${{ steps.version.outputs.VERSION }}-x86_64 \
            ./cmd/neukeiho

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }} -s -w" \
            -o dist/neukeiho-${{ steps.version.outputs.VERSION }}-arm64 \
            ./cmd/neukeiho

      - name: Build linux/arm (armv7)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 1
          CC: arm-linux-gnueabihf-gcc
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }} -s -w" \
            -o dist/neukeiho-${{ steps.version.outputs.VERSION }}-arm \
            ./cmd/neukeiho

      - name: Generate checksums
        run: |
          cd dist
          sha256sum \
            neukeiho-${{ steps.version.outputs.VERSION }}-x86_64 \
            neukeiho-${{ steps.version.outputs.VERSION }}-arm64 \
            neukeiho-${{ steps.version.outputs.VERSION }}-arm \
            > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NeuKeiho ${{ steps.version.outputs.VERSION }}
          body: |
            ## NeuKeiho ${{ steps.version.outputs.VERSION }}

            ### Install (Linux x86_64)
            ```bash
            curl -LO https://github.com/meomkarjagtap/neukeiho/releases/download/${{ steps.version.outputs.VERSION }}/neukeiho-${{ steps.version.outputs.VERSION }}-x86_64
            chmod +x neukeiho-${{ steps.version.outputs.VERSION }}-x86_64
            sudo mv neukeiho-${{ steps.version.outputs.VERSION }}-x86_64 /usr/bin/neukeiho
            neukeiho init
            neukeiho start
            ```

            ### Install (Linux arm64)
            ```bash
            curl -LO https://github.com/meomkarjagtap/neukeiho/releases/download/${{ steps.version.outputs.VERSION }}/neukeiho-${{ steps.version.outputs.VERSION }}-arm64
            chmod +x neukeiho-${{ steps.version.outputs.VERSION }}-arm64
            sudo mv neukeiho-${{ steps.version.outputs.VERSION }}-arm64 /usr/bin/neukeiho
            neukeiho init
            neukeiho start
            ```

            ### Install (Linux arm / armv7)
            ```bash
            curl -LO https://github.com/meomkarjagtap/neukeiho/releases/download/${{ steps.version.outputs.VERSION }}/neukeiho-${{ steps.version.outputs.VERSION }}-arm
            chmod +x neukeiho-${{ steps.version.outputs.VERSION }}-arm
            sudo mv neukeiho-${{ steps.version.outputs.VERSION }}-arm /usr/bin/neukeiho
            neukeiho init
            neukeiho start
            ```

            ### Verify checksum
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            dist/neukeiho-${{ steps.version.outputs.VERSION }}-x86_64
            dist/neukeiho-${{ steps.version.outputs.VERSION }}-arm64
            dist/neukeiho-${{ steps.version.outputs.VERSION }}-arm
            dist/checksums.txt
          draft: false
          prerelease: false
