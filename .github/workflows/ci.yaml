name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gcc (required for go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Tidy and download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -o neukeiho ./cmd/neukeiho

      - name: Test
        env:
          CGO_ENABLED: 1
        run: go test ./...
